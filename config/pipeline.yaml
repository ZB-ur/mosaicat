stages:
  researcher:
    clarification: true
    gate: auto
    retry_max: 3
  product_owner:
    clarification: false
    gate: manual
    retry_max: 3
  ux_designer:
    clarification: true
    gate: auto
    retry_max: 3
  api_designer:
    clarification: true
    gate: auto
    retry_max: 3
  ui_designer:
    clarification: true
    gate: manual
    retry_max: 3
  validator:
    clarification: false
    gate: auto
    retry_max: 3

  # --- New stages (Phase 6-8) ---
  intent_consultant:
    clarification: false  # handled internally via multi-turn dialogue
    gate: auto
    retry_max: 1
  tech_lead:
    clarification: true
    gate: manual
    retry_max: 3
  coder:
    clarification: false
    gate: auto
    retry_max: 3
  reviewer:
    clarification: false
    gate: manual
    retry_max: 3
  qa_lead:
    clarification: false
    gate: auto
    retry_max: 3

profiles:
  design-only:
    - intent_consultant
    - researcher
    - product_owner
    - ux_designer
    - api_designer
    - ui_designer
    - validator
  full:
    - intent_consultant
    - researcher
    - product_owner
    - ux_designer
    - api_designer
    - ui_designer
    - tech_lead
    - coder
    - reviewer
    - validator
  frontend-only:
    - intent_consultant
    - researcher
    - product_owner
    - ux_designer
    - ui_designer
    - tech_lead
    - coder
    - reviewer
    - validator

pipeline:
  max_retries_per_stage: 3
  snapshot: on_stage_complete

security:
  initiator: ""
  reject_policy: silent

github:
  enabled: false
  poll_interval_ms: 10000
  poll_timeout_ms: 3600000
  approve_keywords:
    - "/approve"
  reject_keywords:
    - "/reject"

evolution:
  enabled: false
  cooldown_hours: 24

# LLM provider pool — configure which models are available
# Default: auto-detect (ANTHROPIC_API_KEY → anthropic-sdk, else → claude-cli)
llm:
  default: claude-cli
  providers:
    claude-cli:
      type: claude-cli
    anthropic-sdk:
      type: anthropic-sdk
      model: claude-sonnet-4-20250514
    gpt-4o:
      type: openai-compatible
      base_url: https://api.openai.com/v1
      model: gpt-4o
      api_key_env: OPENAI_API_KEY
    qwen-max:
      type: openai-compatible
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen-max
      api_key_env: DASHSCOPE_API_KEY
    doubao:
      type: openai-compatible
      base_url: https://ark.cn-beijing.volces.com/api/v3
      model: doubao-pro-256k
      api_key_env: ARK_API_KEY
    kimi:
      type: openai-compatible
      base_url: https://api.moonshot.cn/v1
      model: moonshot-v1-128k
      api_key_env: MOONSHOT_API_KEY
    gemini:
      type: openai-compatible
      base_url: https://generativelanguage.googleapis.com/v1beta/openai
      model: gemini-2.5-pro
      api_key_env: GOOGLE_API_KEY
    deepseek:
      type: openai-compatible
      base_url: https://api.deepseek.com/v1
      model: deepseek-chat
      api_key_env: DEEPSEEK_API_KEY
    minimax:
      type: openai-compatible
      base_url: https://api.minimax.chat/v1
      model: MiniMax-Text-01
      api_key_env: MINIMAX_API_KEY
