stages:
  researcher:
    clarification: true
    gate: auto
    retry_max: 3
  product_owner:
    clarification: false
    gate: manual
    retry_max: 3
  ux_designer:
    clarification: true
    gate: auto
    retry_max: 3
  api_designer:
    clarification: true
    gate: auto
    retry_max: 3
  ui_designer:
    clarification: true
    gate: manual
    retry_max: 3
  validator:
    clarification: false
    gate: auto
    retry_max: 3

  # --- New stages (Phase 6-8) ---
  intent_consultant:
    clarification: false  # handled internally via multi-turn dialogue
    gate: auto
    retry_max: 1
  tech_lead:
    clarification: true
    gate: manual
    retry_max: 3
  coder:
    clarification: false
    gate: auto
    retry_max: 3
  reviewer:
    clarification: false
    gate: manual
    retry_max: 3

pipeline:
  max_retries_per_stage: 3
  snapshot: on_stage_complete

security:
  initiator: ""
  reject_policy: silent

github:
  enabled: false
  poll_interval_ms: 10000
  poll_timeout_ms: 3600000
  approve_keywords:
    - "/approve"
  reject_keywords:
    - "/reject"

evolution:
  enabled: false
  cooldown_hours: 24
