stages:
  researcher:
    clarification: true
    gate: auto
    retry_max: 3
  product_owner:
    clarification: false
    gate: manual
    retry_max: 3
  ux_designer:
    clarification: true
    gate: auto
    retry_max: 3
  api_designer:
    clarification: true
    gate: auto
    retry_max: 3
  ui_designer:
    clarification: false
    gate: manual
    retry_max: 3
  validator:
    clarification: false
    gate: auto
    retry_max: 3

pipeline:
  max_retries_per_stage: 3
  snapshot: on_stage_complete

security:
  initiator: ""
  reject_policy: silent
