agents:
  researcher:
    name: Researcher
    prompt_file: .claude/agents/mosaic/researcher.md
    inputs:
      - user_instruction
      - intent-brief.json
    outputs:
      - research.md
      - research.manifest.json
    autonomy:
      allowed_tools:
        - WebSearch
        - WebFetch
      max_turns: 3

  product_owner:
    name: ProductOwner
    prompt_file: .claude/agents/mosaic/product-owner.md
    inputs:
      - user_instruction
      - intent-brief.json
      - research.md
    outputs:
      - prd.md
      - prd.manifest.json
    autonomy:
      allowed_tools: []
      max_turns: 1

  ux_designer:
    name: UXDesigner
    prompt_file: .claude/agents/mosaic/ux-designer.md
    inputs:
      - prd.md
    outputs:
      - ux-flows.md
      - ux-flows.manifest.json
    autonomy:
      allowed_tools: []
      max_turns: 1

  api_designer:
    name: APIDesigner
    prompt_file: .claude/agents/mosaic/api-designer.md
    inputs:
      - prd.md
      - ux-flows.md
    outputs:
      - api-spec.yaml
      - api-spec.manifest.json
    autonomy:
      allowed_tools: []
      max_turns: 1

  ui_designer:
    name: UIDesigner
    prompt_file: .claude/agents/mosaic/ui-designer.md
    inputs:
      - prd.md
      - ux-flows.md
      - api-spec.yaml
    outputs:
      - components/
      - previews/
      - screenshots/
      - gallery.html
      - components.manifest.json
    autonomy:
      allowed_tools: []
      max_turns: 1

  validator:
    name: Validator
    prompt_file: .claude/agents/mosaic/validator.md
    inputs:
      - research.manifest.json
      - prd.manifest.json
      - ux-flows.manifest.json
      - api-spec.manifest.json
      - components.manifest.json
      - tech-spec.manifest.json
      - code.manifest.json
      - review.manifest.json
    outputs:
      - validation-report.md
    autonomy:
      allowed_tools: []
      max_turns: 1

  # --- New stages (Phase 6-8) ---
  intent_consultant:
    name: IntentConsultant
    prompt_file: .claude/agents/mosaic/intent-consultant.md
    inputs:
      - user_instruction
    outputs:
      - intent-brief.json
    autonomy:
      allowed_tools: []
      max_turns: 3

  tech_lead:
    name: TechLead
    prompt_file: .claude/agents/mosaic/tech-lead.md
    inputs:
      - prd.md
      - ux-flows.md
      - api-spec.yaml
    outputs:
      - tech-spec.md
      - tech-spec.manifest.json
    autonomy:
      allowed_tools:
        - WebSearch
        - WebFetch
      max_turns: 3

  coder:
    name: Coder
    prompt_file: .claude/agents/mosaic/coder.md
    inputs:
      - tech-spec.md
      - api-spec.yaml
    outputs:
      - code/
      - code.manifest.json
    autonomy:
      allowed_tools:
        - Read
        - Write
        - Bash
        - Agent
        - WebSearch
      writable_paths:
        - .mosaic/artifacts/code/
      max_turns: 10
      max_budget_usd: 5

  reviewer:
    name: Reviewer
    prompt_file: .claude/agents/mosaic/reviewer.md
    inputs:
      - tech-spec.md
      - code/
      - code.manifest.json
    outputs:
      - review-report.md
      - review.manifest.json
    autonomy:
      allowed_tools:
        - Read
      max_turns: 3
